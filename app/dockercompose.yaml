version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: .dockerfile  
    container_name: backend_service
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=production
      - PORT=8002
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: .dockerfile
    container_name: frontend_service
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
